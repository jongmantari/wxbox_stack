packages:
  gcc:
    externals:
    - spec: gcc@13.3.0 languages:='c,c++,fortran'
      prefix: /usr
      extra_attributes:
        compilers:
          c: /usr/bin/gcc
          cxx: /usr/bin/g++
          fortran: /usr/bin/gfortran
  intel-oneapi-compilers:
    externals:
    - spec: intel-oneapi-compilers@2025.3.3
      prefix: /opt/intel/oneapi
      extra_attributes:
        compilers:
          c: /opt/intel/oneapi/compiler/2025.3/bin/icx
          cxx: /opt/intel/oneapi/compiler/2025.3/bin/icpx
          fortran: /opt/intel/oneapi/compiler/2025.3/bin/ifx
  grep:
    externals:
    - spec: grep@3.11
      prefix: /usr
  wget:
    externals:
    - spec: wget@1.21.4
      prefix: /usr
  gmake:
    externals:
    - spec: gmake@4.3
      prefix: /usr
  tar:
    externals:
    - spec: tar@1.35
      prefix: /usr
  git:
    externals:
    - spec: git@2.43.0~tcltk
      prefix: /usr
  openssh:
    externals:
    - spec: openssh@9.6p1
      prefix: /usr
  binutils:
    externals:
    - spec: binutils@2.42+gold~headers
      prefix: /usr
  automake:
    externals:
    - spec: automake@1.16.5
      prefix: /usr
  autoconf:
    externals:
    - spec: autoconf@2.71
      prefix: /usr
  sed:
    externals:
    - spec: sed@4.9
      prefix: /usr
  gawk:
    externals:
    - spec: gawk@5.2.1
      prefix: /usr
  libtool:
    externals:
    - spec: libtool@2.4.7
      prefix: /usr
  git-lfs:
    externals:
    - spec: git-lfs@3.4.1
      prefix: /usr
  diffutils:
    externals:
    - spec: diffutils@3.10
      prefix: /usr
  pkgconf:
    externals:
    - spec: pkgconf@1.8.1
      prefix: /usr
  perl:
    externals:
    - spec: perl@5.38.2~cpanm+opcode+open+shared+threads
      prefix: /usr
  flex:
    externals:
    - spec: flex@2.6.4+lex
      prefix: /usr
  groff:
    externals:
    - spec: groff@1.23.0
      prefix: /usr
  findutils:
    externals:
    - spec: findutils@4.9.0
      prefix: /usr
  coreutils:
    externals:
    - spec: coreutils@9.4
      prefix: /usr
  intel-oneapi-runtime:
    buildable: false
    externals:
    - spec: intel-oneapi-runtime@2025.3.0
      prefix: /opt/intel/oneapi
      modules:
      - compiler-rt/latest
  intel-oneapi-mkl:
    buildable: false
    externals:
    - spec: intel-oneapi-mkl@2025.3
      prefix: /opt/intel/oneapi
      modules:
      - mkl/2025.3
  intel-oneapi-mpi:
    buildable: false
    externals:
    - spec: intel-oneapi-mpi@2021.17
      prefix: /opt/intel/oneapi
      modules:
      - mpi/2021.17
  intel-oneapi-tbb:
    buildable: false
    externals:
    - spec: intel-oneapi-tbb@2022.3
      prefix: /opt/intel/oneapi
      modules:
      - tbb/2022.3
