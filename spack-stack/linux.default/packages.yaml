
packages:
    # Virtual provider settings
    c:
      prefer:
      - intel-oneapi-compilers
    cxx:
      prefer:
      - intel-oneapi-compilers
    fortran:
      prefer:
      - intel-oneapi-compilers
    # Virtual package settings
    blas:
      require:
      - intel-oneapi-mkl
    fftw-api:
      require:
      - intel-oneapi-mkl
    lapack:
      require:
      - intel-oneapi-mkl
    # Individual package settings
    antlr:
      require:
      - '%c,cxx=gcc'
    bison:
      require:
      - '%c,cxx=gcc'
      - '@3.4:'
    cmake:
      require:
      - '%c,cxx=gcc'
      - '@3.29:'
      - +ownlibs
    ectrans:
      require:
      - +mkl
      - ~fftw
      - '@1.7.0'
    #gmake:
    #  require:
    #  - '%c=gcc'
    go:
      require:
      - '%c,cxx=gcc'
    libbsd:
      require:
      - '%c=gcc'
    libmd:
      require:
      - '%c=gcc'
    met:
      require:
      - +shared-intel
      - '@12.1.1'
      - +python
      - +grib2
    nco:
      require:
      - '%c,cxx=gcc'
      - ~doc
    oops:
      require:
      - +mkl
    parallel-netcdf:
      require:
      - +shared-intel
      - '@1.12.3'
    py-maturin:
      require:
      - '%c=gcc'
    py-scipy:
      require:
      - cxxflags="-O1"
    qt:
      require:
      - '%c,cxx=gcc'
      - '@5'
    rust:
      require:
      - '%c,cxx=gcc'
    jpeg:
      require:
      - libjpeg-turbo
    pkgconfig:
      require:
      - pkg-config
    yacc:
      require:
      - bison
    zlib-api:
      require:
      - zlib
    # Individual package settings
    awscli-v2:
      require:
      - ~examples
    bacio:
      require:
      - '@2.6.0'
    boost:
      require:
      - '@1.84.0'
      - ~atomic
      - +chrono
      - +date_time
      - +exception
      - +filesystem
      - ~graph
      - ~iostreams
      - ~locale
      - ~log
      - ~math
      - ~mpi
      - ~numpy
      - +pic
      - +program_options
      - +python
      - ~random
      - +regex
      - +serialization
      - +system
      - +test
      - +thread
      - +timer
      - ~wave
      - cxxstd=17
      - visibility=hidden
    bufr:
      require:
      - '@12.3.0'
      - +python
    bufr-query:
      require:
      - '@0.0.5'
      - +python
    cairo:
      require:
      - +pic
    cdo:
      require:
      - ~openmp
      - any_of:
        - '@2.3.0'
        when: '%intel@2021:'
        message: 2.3.0 is the last version to use C++17, use with Intel Classic
      - any_of:
        - '@2.3.0'
        when: '%gcc@:10'
        message: 2.3.0 is the last version to use C++17, use with GCC 10 and earlier
      - any_of:
        - '@2.3.0'
        when: '%apple-clang@:14'
        message: 2.3.0 is the last version to use C++17, use with Apple Clang 14 and earlier
      - any_of:
        - '@2.0.5'
        when: '%intel@:2020'
        message: 2.0.5 is the last version to use C++14, use with Intel Classic 2020 and earlier
    codee:
      require:
      - '@2025.4.7'
    # Attention - when updating also check the various jcsda-emc-bundles env packages
    crtm:
      require:
      - +fix
    ecbuild:
      require:
      - '@3.12.0'
    eccodes:
      require:
      - '@2.33.0'
      - +netcdf
      - +png
      - +tools
    ecflow:
      require:
      - '@5.11.4'
      - +ui
    eckit:
      require:
      - '@1.32.3'
      - linalg=eigen,lapack
      - compression=lz4,bzip2
    ecmwf-atlas:
      require:
      - '@0.44.1'
      - +fckit
      - +trans
      - +tesselation
      - +fftw
    eigen:
      require:
      - '@3.4.0'
    # Attention - when updating the version also check the common modules.yaml
    # config and update the projections for lmod/tcl.
    # Also, check the acorn and derecho site configs which have esmf modifications.
    esmf:
      require:
      - ~xerces
      - ~pnetcdf
      - +shared
      - +external-parallelio
      - any_of:
        - '@=8.6.1 snapshot=none'
        - '@=8.8.0 snapshot=none'
        - '@=8.9.0 snapshot=none'
        - '@=8.9.1 snapshot=none'
      - any_of:
        - fflags="-fp-model precise" cxxflags="-fp-model precise"
        when: '%intel'
        message: Extra ESMF compile options for Intel
    expat:
      require:
      - ~libbsd
    fckit:
      require:
      - '@0.14.1'
      - +eckit
    fftw:
      require:
      - '@3.3.10'
    fiat:
      require:
      - '@1.6.1'
    flex:
      require:
      - '@2.6.4'
    fms:
      require:
      - '@2025.03'
      - precision=32,64
      - +quad_precision
      - +openmp
      - +pic
      - build_type=Release
      - any_of:
        - +gfs_phys constants=GFS
        - ~gfs_phys constants=GEOS
    fontconfig:
      require:
      - +pic
    freetype:
      require:
      - +pic
    g2:
      require:
      - '@3.5.1'
    g2c:
      require:
      - '@2.3.0'
    g2tmpl:
      require:
      - '@1.17.0'
    # This version builds with Intel oneAPI compilers, newer/older versions don't
    gdal:
      require:
      - '@3.10.2'
    # *DH
    gfsio:
      require:
      - '@1.4.2'
    global-workflow-env:
      require:
      - +uwtools
    grib-util:
      require:
      - '@1.4.0'
    gsibec:
      require:
      - '@1.4.2'
    gsi-ncdiag:
      require:
      - '@1.1.3'
    harfbuzz:
      # cmake-based harfbuzz fails during build
      require:
      - one_of:
        - build_system=meson
        - build_system=autotools
    hdf:
      require:
      - '@4.2.15'
      - +external-xdr
      - ~fortran
      - ~netcdf
    hdf5:
      require:
      - '@1.14.5'
      - +hl
      - +fortran
      - +mpi
      - +threadsafe
      - ~szip
    # Newer versions of hdf-eos2 require manual downloading, avoid
    hdf-eos2:
      require:
      - '@2.20v1.00'
    intel-oneapi-compilers-runtime:
      require:
      - '%oneapi'
    intel-oneapi-compilers-classic-runtime:
      require:
      - '%intel'
    ip:
      require:
      - '@5.4.0'
      - precision=4,d,8
    ip2:
      require:
      - '@1.1.2'
    jedi-cmake:
      require:
      - '@1.4.0'
    landsfcutil:
      require:
      - '@2.4.2'
    # https://github.com/JCSDA/spack-stack/actions/runs/20957699537/job/60226338267
    libaec:
      prefer:
      - build_system=cmake
      - generator=make
    libpng:
      require:
      - '@1.6.37'
      - +pic
    # libtirpc +gssapi doesn't build with oneapi@2025
    # https://github.com/JCSDA/spack-stack/issues/1441
    libtirpc:
      require:
      - ~gssapi
    # Newest version of magics needed for oneapi compilers
    magics:
      require:
      - '@4.15.3:'
    mapl:
      require:
      - '@2.53'
      - ~shared
      - ~f2py
      - +pflogger
    metplus:
      require:
      - '@6.1.0'
    metis:
      require:
      - +int64
      - +real64
    mpich:
      require:
      - ~hwloc
    nemsio:
      require:
      - '@2.5.5'
    nemsiogfs:
      require:
      - '@2.5.4'
    nccmp:
      require:
      - '@1.9.0.1'
    ncio:
      require:
      - '@1.1.2'
    netcdf-c:
      require:
      - '@4.9.2'
      - +dap
      - +mpi
      - ~parallel-netcdf
      - ~szip
      - +parallel_tests
      - build_system=cmake
    netcdf-cxx4:
      require:
      - '@4.3.1'
    netcdf-fortran:
      require:
      - '@4.6.1'
      - +parallel_tests
    # ninja - when adding information here, also check Discover site config
    odc:
      require:
      - '@1.6.1'
      - ~fortran
    openmpi:
      require:
      - ~internal-hwloc
      - +two_level_namespace
    openssl:
      require:
      - +shared
      - '@3'
    p4est:
      require:
      - '@2.8.7'
    # Earlier versions of pango don't build on Blueback because of
    # a bug in finding the correct Python interpreter from spack.
    pango:
      require:
      - '@1.54:'
    parallelio:
      require:
      - '@2.6.2'
      - +pnetcdf
    # DH* CAN WE UPDATE? NEED A NEW SHARED-INTEL PATCH?
    pflogger:
      require:
      - +mpi
    pfunit:
      require:
      - +mpi
      - +fhamcrest
    pixman:
      require:
      - +pic
    prod-util:
      require:
      - '@2.1.2'
    proj:
      require:
      - ~tiff
    # Turn off crypt variant for Python; this leads to build errors
    # with Intel in py-cryptography unless external curl and openssl
    # are removed, which itself is problematic.
    python:
      require:
      - '@3.11'
      - ~crypt
    # Not sure about the exact version requirements, but earlier
    # versions (definitely 4.5.3 and earlier) don't work with newer
    # py-setuptools (version 68 and later) because of a breaking
    # change: error in beautifulsoup4 setup command: use_2to3 is invalid
    py-beautifulsoup4:
      require:
      - '@4.12.3:'
    py-cartopy:
      require:
      - +plotting
    # Pin py-colorama to avoid duplicate packages, hopefully can be removed soon
    py-colorama:
      require:
      - '@0.4.6'
    # Pin to version 42 to avoid maturin dependency that breaks Intel oneAPI builds
    py-cryptography:
      require:
      - '@42'
    # To avoid duplicate packages
    py-flit-core:
      require:
      - '@3.8.0'
    py-h5py:
      require:
      - ~mpi
    # Needed to fix issues of older versions (e.g. 1.13.0) with newer Python and
    # newer python packages: "ValueError: Unknown classifier in field project.classifiers ..."
    py-hatchling:
      require:
      - '@1.27:'
    # To avoid duplicate packages
    py-lxml:
      require:
      - '@5.2.2'
    # https://github.com/JCSDA/spack-stack/issues/1276
    py-matplotlib:
      require:
      - '@3.7.4'
      #- '@3.8.0'
    py-netcdf4:
      require:
      - +mpi
    # To avoid duplicate packages
    py-numpy:
      require:
      - '@1'
    # To avoid duplicate packages
    py-poetry-core:
      require:
      - '@1.7'
    # Need at least py-pygithub@2.7 for self-hosted runner management
    py-pygithub:
      require:
      - '@2.7:'
    # This version builds with Intel oneAPI compilers, newer versions don't
    py-pyogrio:
      require:
      - '@0.9.0'
    # To avoid duplicate packages
    py-python-dateutil:
      require:
      - '@2'
    # To avoid duplicate packages
    py-requests:
      require:
      - '@2.32.3'
    # To avoid duplicate packages
    py-ruamel-yaml:
      require:
      - '@0.17.16'
    # Pin the py-setuptools version to avoid duplicate Python packages
    py-setuptools:
      require:
      - '@69'
    py-torch:
      require:
      - +custom-protobuf
      - ~mkldnn
    # To avoid duplicate packages
    py-urllib3:
      require:
      - '@1.26.20'
      # OR - '@1.26.12' ?
    # To avoid duplicate packages
    py-versioneer:
      require:
      - '@0.29'
    scotch:
      require:
      - '@7.0.10'
      - +mpi
      - +metis
      - ~shared
      - ~threads
      - ~mpi_thread
      - +noarch
      - +esmumps
      - +fortran
      - determinism=FIXED_SEED
    sfcio:
      require:
      - '@1.4.2'
    shumlib:
      require:
      - '@macos_clang_linux_intel_port'
    sigio:
      require:
      - '@2.3.3'
    # To avoid duplicate packages
    snappy:
      require:
      - +shared
    udunits:
      require:
      - '@2.2.28'
    ufs-utils:
      require:
      - '@1.13.0'
    # Note - we can remove upp from stack at some point?
    upp:
      require:
      - '@10.0.10'
    uwtools:
      require:
      - '@2.7.2'
    w3emc:
      require:
      - '@2.13.0'
      - precision=4,d,8
      - +build_deprecated
    w3nco:
      require:
      - '@2.4.1'
    # See macOS site config for wgrib2 version/variant overrides
    wgrib2:
      require:
      - '@3.8.0'
      - +ipolates
      - +netcdf
    wrf-io:
      require:
      - '@1.3.0'
    zstd:
      require:
      - '@1.5.7'
      - +programs
